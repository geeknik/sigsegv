# Usurper Reborn — Nginx Reverse Proxy
#
# Routes traffic to the usurper-web container (Node.js proxy).
# For SSL, add a server block listening on 443 with your certificates,
# or use certbot: certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name _;

    # Proxy all requests to the web container
    location / {
        proxy_pass http://usurper-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints (disable buffering for SSE streams)
    location /api/ {
        proxy_pass http://usurper-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket upgrade for browser terminal
    location /ws {
        proxy_pass http://usurper-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Clean URLs for dashboard pages
    location = /dashboard { proxy_pass http://usurper-web:3000/dashboard.html; }
    location = /balance { proxy_pass http://usurper-web:3000/balance.html; }
    location = /admin { proxy_pass http://usurper-web:3000/admin.html; }
}
